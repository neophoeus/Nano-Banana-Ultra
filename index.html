<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nano Banana Ultra 🍌</title>
  <style>
    /* Custom scrollbar for better aesthetics */
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
    }

    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
      background-color: rgba(245, 158, 11, 0.3);
      border-radius: 20px;
      border: 1px solid rgba(245, 158, 11, 0.1);
    }

    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
      background-color: rgba(245, 158, 11, 0.6);
    }

    /* Checkerboard pattern for transparent backgrounds - Improved visibility */
    .bg-checkerboard {
      background-color: #1a1a1a;
      background-image:
        linear-gradient(45deg, #252525 25%, transparent 25%),
        linear-gradient(-45deg, #252525 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #252525 75%),
        linear-gradient(-45deg, transparent 75%, #252525 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }
  </style>
  <!-- importmap removed: Vite handles module resolution via npm -->
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-white dark:bg-black text-gray-900 dark:text-gray-100 transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
